<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PORTAL RETRO</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    font-family: 'Press Start 2P', cursive;
    color: rgb(85, 81, 81);
    text-align: center;
}

#emulador-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 40px;
}

#emulador-area button {
    margin-bottom: 20px;
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
    padding: 12px 24px;
    background: #222;
    color: #fff;
    border: 2px solid #555;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

#emulador-area button:hover {
    background: #444;
    color: #ff5e00;
    transform: scale(1.05);
}

#emulator-container {
    width: 640px;
    height: 480px;
    margin: 20px auto;
}
</style>
</head>

<body>

<h2>PORTAL RETRO</h2>
<p>JOGUE CLÁSSICOS DIRETO DO NAVEGADOR</p>

<div id="emulador-area">

<button onclick="carregarJogo('Pokemon Fire Red','PokemonFireRed.zip','gba')">
Pokémon Fire Red
</button>

<button onclick="carregarJogo('Contra','Contra.zip','nes')">
Contra
</button>

<button onclick="carregarJogo('Sonic','Sonic.zip','genesis')">
Sonic
</button>

<button onclick="carregarJogo('Super Mario World','MarioWorld.zip','snes')">
Super Mario World
</button>

<div id="emulator-container"></div>

</div>

<script>
function carregarJogo(nome, arquivo, core) {

    const container = document.getElementById("emulator-container");
    container.innerHTML = '<div id="game"></div>';

    const oldScript = document.getElementById("emulator-loader");
    if (oldScript) oldScript.remove();

    window.EJS_player = "#game";
    window.EJS_gameName = nome;
    window.EJS_gameUrl = arquivo;
    window.EJS_core = core;
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/latest/data/";
    window.EJS_startOnLoaded = true;
    window.EJS_disableDatabases = true;

    const script = document.createElement("script");
    script.id = "emulator-loader";
    script.src = "https://cdn.emulatorjs.org/latest/data/loader.js";
    script.async = true;

    document.body.appendChild(script);
}
</script>

</body>
</html>
